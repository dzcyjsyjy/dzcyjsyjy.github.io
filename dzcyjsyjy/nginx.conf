# Nginx配置文件 - 达州产业技术研究院官方网站
# 将此文件放置在 /etc/nginx/conf.d/ 目录下

server {
    listen 80;
    server_name www.dzcyjsyjy.com dzcyjsyjy.com;
    
    # 网站根目录
    root /var/www/html;
    index index.html index.htm;
    
    # 访问日志
    access_log /var/log/nginx/dzcyjsyjy_access.log;
    error_log /var/log/nginx/dzcyjsyjy_error.log;
    
    # 主要位置块
    location / {
        try_files $uri $uri/ =404;
    }
    
    # 开启gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    
    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

